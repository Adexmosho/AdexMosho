<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="512" height="512" rx="120" fill="url(#mainGradient)" />

  <!-- Abstract Design Elements -->
  <g filter="url(#glow)">
    <!-- Aerodynamic Curve (Car/Tech) -->
    <path d="M100 280C100 180 200 120 400 120" stroke="#2563eb" stroke-width="24" stroke-linecap="round" opacity="0.6" />
    <path d="M120 310C120 220 210 160 380 160" stroke="#2563eb" stroke-width="12" stroke-linecap="round" opacity="0.4" />

    <!-- Organic Vein (Herb/Trado) -->
    <path d="M412 232C412 332 312 392 112 392" stroke="#10b981" stroke-width="24" stroke-linecap="round" opacity="0.6" />
    <path d="M392 202C392 292 302 352 132 352" stroke="#10b981" stroke-width="12" stroke-linecap="round" opacity="0.4" />
  </g>

  <!-- Central Symbol: The Fusion -->
  <g filter="url(#glow)">
    <!-- The "A" stylized as both a Road and a Leaf Stem -->
    <path d="M256 140L160 380" stroke="white" stroke-width="32" stroke-linecap="round" />
    <path d="M256 140L352 380" stroke="white" stroke-width="32" stroke-linecap="round" />
    <path d="M200 300C200 300 256 260 312 300" stroke="url(#accentGradient)" stroke-width="32" stroke-linecap="round" />

    <!-- Floating Node -->
    <circle cx="256" cy="140" r="24" fill="white" />
    <circle cx="256" cy="140" r="12" fill="#2563eb" />
  </g>

  <!-- Subtle Texture -->
  <rect width="512" height="512" rx="120" fill="white" opacity="0.03" />
</svg>
